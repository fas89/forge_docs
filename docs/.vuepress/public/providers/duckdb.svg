<?xml version="1.0" encoding="UTF-8"?>
<!--
  DuckDB / Local — simplified duck head brand mark
  Uses DuckDB's signature yellow (#FFF000) on a dark background to
  evoke the official duck logo without infringing on the trademark.
  ============================================================
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="DuckDB / Local">
  <rect x="4" y="4" width="56" height="56" rx="12" fill="#1f2937"/>
  <!-- Duck head silhouette -->
  <g transform="translate(8, 14)">
    <!-- Head -->
    <ellipse cx="28" cy="20" rx="20" ry="18" fill="#FFF000"/>
    <!-- Bill -->
    <path d="M40 18 Q52 18 50 26 Q42 28 38 24 Z" fill="#FF7B00"/>
    <!-- Eye (white socket + black pupil) -->
    <circle cx="32" cy="14" r="3.5" fill="#fff"/>
    <circle cx="32.5" cy="13.5" r="2" fill="#0f172a"/>
    <!-- Subtle tuft -->
    <path d="M22 5 Q24 1 27 4 Q26 7 22 5Z" fill="#FFF000" opacity="0.8"/>
  </g>
  <!-- "Local" hint badge -->
  <text x="32" y="56" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif"
        font-size="8" font-weight="700" fill="#FFF000" letter-spacing="1.5">LOCAL</text>
</svg>
