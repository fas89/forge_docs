<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fluid Forge — $0.03 per data product</title>
<style>
  :root {
    --bg-0: #07090f;
    --bg-1: #0d1119;
    --bg-2: #131826;
    --bg-3: #1a2032;
    --text: #e6e8ee;
    --text-dim: #9ba3b4;
    --text-faint: #5a6378;
    --accent: #6cf5d8;
    --accent-2: #b486ff;
    --warn: #f5c46c;
    --good: #7be0a3;
    --bad: #ff7b7b;
    --pink: #f08aa9;
    --rule: #232a3d;
    --shadow: 0 30px 80px -20px rgba(0,0,0,0.6), 0 12px 30px -10px rgba(0,0,0,0.5);
    --mono: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background:
      radial-gradient(60% 50% at 80% 0%, rgba(108,245,216,0.06), transparent 60%),
      radial-gradient(80% 60% at 10% 100%, rgba(180,134,255,0.06), transparent 60%),
      var(--bg-0);
    color: var(--text);
    font-family: var(--sans);
    overflow: hidden;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }
  .stage {
    width: min(1100px, 100vw - 40px);
    height: min(720px, 100vh - 120px);
    background: linear-gradient(180deg, var(--bg-1), var(--bg-0));
    border: 1px solid var(--rule);
    border-radius: 16px;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
  }
  .scene {
    position: absolute;
    inset: 0;
    padding: 40px 48px;
    opacity: 0;
    transition: opacity 480ms ease;
    display: flex;
    flex-direction: column;
    pointer-events: none;
  }
  .scene.active { opacity: 1; pointer-events: auto; }
  .scene-title { letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); font-size: 12px; font-weight: 600; margin-bottom: 8px; }
  .scene-headline { font-size: 36px; font-weight: 700; line-height: 1.1; letter-spacing: -0.02em; margin-bottom: 12px; }
  .scene-sub { font-size: 16px; color: var(--text-dim); max-width: 720px; line-height: 1.5; }

  /* Hero / Title scene */
  .hero {
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .hero .brand {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--text-dim);
    letter-spacing: 0.4em;
    text-transform: uppercase;
    margin-bottom: 24px;
  }
  .hero h1 {
    font-size: 88px;
    font-weight: 800;
    letter-spacing: -0.04em;
    background: linear-gradient(110deg, #fff 30%, var(--accent) 80%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 12px;
  }
  .hero .tag {
    font-size: 22px;
    color: var(--text);
    margin-bottom: 8px;
    font-weight: 500;
  }
  .hero .tag em {
    color: var(--accent);
    font-style: normal;
    font-weight: 600;
  }
  .hero .meta {
    margin-top: 28px;
    color: var(--text-faint);
    font-size: 13px;
    font-family: var(--mono);
  }
  .badges {
    display: flex;
    gap: 10px;
    margin-top: 28px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .badge {
    background: rgba(108,245,216,0.08);
    border: 1px solid rgba(108,245,216,0.25);
    color: var(--accent);
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-family: var(--mono);
    letter-spacing: 0.05em;
  }
  .badge.alt {
    background: rgba(180,134,255,0.08);
    border-color: rgba(180,134,255,0.25);
    color: var(--accent-2);
  }
  .badge.good {
    background: rgba(123,224,163,0.08);
    border-color: rgba(123,224,163,0.25);
    color: var(--good);
  }

  /* Terminal scenes */
  .term-wrap {
    flex: 1;
    margin-top: 14px;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .term {
    flex: 1;
    background: var(--bg-2);
    border: 1px solid var(--rule);
    border-radius: 10px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .term-bar {
    background: var(--bg-3);
    height: 32px;
    border-bottom: 1px solid var(--rule);
    display: flex;
    align-items: center;
    padding: 0 14px;
    flex-shrink: 0;
  }
  .term-bar .lights {
    display: flex;
    gap: 7px;
  }
  .term-bar .light {
    width: 12px;
    height: 12px;
    border-radius: 50%;
  }
  .light.r { background: #ff5f56; }
  .light.y { background: #ffbd2e; }
  .light.g { background: #27c93f; }
  .term-bar .title {
    flex: 1;
    text-align: center;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }
  .term-body {
    flex: 1;
    padding: 18px 22px;
    font-family: var(--mono);
    font-size: 13.5px;
    line-height: 1.55;
    overflow: auto;
    color: #cdd1de;
  }
  .term-body::-webkit-scrollbar { width: 6px; height: 6px; }
  .term-body::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 3px; }
  .term-line { white-space: pre-wrap; word-break: break-word; }
  .term-line.faint { color: var(--text-faint); }
  .term-line.dim { color: var(--text-dim); }
  .term-line.cmd { color: var(--text); }
  .term-line.prompt::before {
    content: "❯ ";
    color: var(--accent);
    font-weight: 700;
  }
  .term-line.success { color: var(--good); }
  .term-line.warn { color: var(--warn); }
  .term-line.error { color: var(--bad); }
  .term-line.info { color: var(--accent); }
  .term-line.alt { color: var(--accent-2); }
  .term-line.rule {
    color: var(--text-faint);
    border: 0;
  }
  .term-line.spaced { margin-top: 6px; }
  .term-cursor {
    display: inline-block;
    background: var(--accent);
    width: 8px;
    height: 1.1em;
    vertical-align: text-bottom;
    margin-left: 2px;
    animation: blink 1.05s steps(2, start) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* Side panel for split scenes */
  .split {
    flex: 1;
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 22px;
    margin-top: 16px;
    min-height: 0;
  }
  .panel {
    background: var(--bg-2);
    border: 1px solid var(--rule);
    border-radius: 10px;
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .panel h3 {
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 12px;
    font-weight: 600;
  }
  .panel .body {
    flex: 1;
    overflow: auto;
    font-family: var(--mono);
    font-size: 12.5px;
    line-height: 1.6;
    color: #c4cad9;
  }

  /* Compare table */
  .compare {
    flex: 1;
    margin-top: 18px;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .compare table {
    width: 100%;
    border-collapse: collapse;
    background: var(--bg-2);
    border: 1px solid var(--rule);
    border-radius: 10px;
    overflow: hidden;
    font-family: var(--mono);
    font-size: 13px;
  }
  .compare th, .compare td {
    padding: 12px 16px;
    text-align: left;
    border-bottom: 1px solid var(--rule);
  }
  .compare th {
    background: var(--bg-3);
    color: var(--text-dim);
    font-weight: 500;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .compare tr:last-child td { border-bottom: 0; }
  .compare .col-key { color: var(--text); font-weight: 500; }
  .compare .col-before { color: var(--bad); font-family: var(--mono); }
  .compare .col-after { color: var(--good); font-family: var(--mono); }
  .compare .col-impact { color: var(--text-dim); font-size: 12px; }

  /* Highlight callout */
  .callout {
    background: linear-gradient(135deg, rgba(108,245,216,0.1), rgba(180,134,255,0.1));
    border: 1px solid rgba(108,245,216,0.3);
    border-radius: 10px;
    padding: 18px 22px;
    margin-top: 16px;
    font-family: var(--mono);
    font-size: 13.5px;
    color: var(--text);
    line-height: 1.55;
  }
  .callout strong { color: var(--accent); font-weight: 600; }

  /* Closing scene */
  .closing {
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .closing h2 {
    font-size: 56px;
    font-weight: 700;
    letter-spacing: -0.03em;
    margin-bottom: 16px;
  }
  .closing .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 28px;
    margin-top: 36px;
    width: 100%;
    max-width: 760px;
  }
  .stat {
    text-align: left;
    padding: 18px 20px;
    background: var(--bg-2);
    border: 1px solid var(--rule);
    border-radius: 10px;
  }
  .stat .num {
    font-size: 32px;
    font-weight: 700;
    color: var(--accent);
    font-family: var(--mono);
    line-height: 1;
  }
  .stat .lbl {
    margin-top: 8px;
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
    line-height: 1.4;
  }

  /* HUD / progress / controls */
  .hud {
    margin-top: 14px;
    width: min(1100px, 100vw - 40px);
    display: flex;
    align-items: center;
    gap: 14px;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 12px;
  }
  .progress {
    flex: 1;
    height: 4px;
    background: var(--rule);
    border-radius: 2px;
    overflow: hidden;
    position: relative;
  }
  .progress-fill {
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    height: 100%;
    width: 0%;
    border-radius: 2px;
    transition: width 200ms linear;
  }
  .controls {
    display: flex;
    gap: 8px;
  }
  .ctrl {
    background: var(--bg-2);
    border: 1px solid var(--rule);
    color: var(--text-dim);
    padding: 5px 12px;
    font-family: var(--mono);
    font-size: 11px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 200ms ease;
  }
  .ctrl:hover { color: var(--text); border-color: var(--accent); }
  .scene-id {
    color: var(--text-faint);
    min-width: 120px;
  }

  /* Token-flow animation for the cost-summary highlight */
  .tokens-flow {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .tok {
    display: inline-block;
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    opacity: 0;
    animation: flow 1.6s ease-in-out infinite;
  }
  .tok:nth-child(2) { animation-delay: 0.15s; }
  .tok:nth-child(3) { animation-delay: 0.3s; }
  .tok:nth-child(4) { animation-delay: 0.45s; }
  @keyframes flow {
    0% { opacity: 0; transform: translateX(-8px); }
    40% { opacity: 1; }
    100% { opacity: 0; transform: translateX(20px); }
  }

  /* Code highlight */
  .term-line .kw { color: #c69cf6; }
  .term-line .str { color: #ffd28e; }
  .term-line .num { color: #7be0a3; }
  .term-line .key { color: #6cf5d8; }
  .term-line .comment { color: #5a6378; font-style: italic; }
  .term-line .pkg { color: #f08aa9; }

  @media (max-width: 880px) {
    .hero h1 { font-size: 56px; }
    .scene-headline { font-size: 28px; }
    .closing h2 { font-size: 36px; }
    .closing .stats { grid-template-columns: 1fr 1fr; }
    .scene { padding: 28px 24px; }
    .term-body { font-size: 12px; }
    .split { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="stage" id="stage">
  <!-- Scenes are injected here -->
</div>

<div class="hud">
  <div class="scene-id" id="sceneId">scene 1 / 9</div>
  <div class="progress"><div class="progress-fill" id="progressFill"></div></div>
  <div class="controls">
    <button class="ctrl" id="prevBtn" title="Previous scene">←</button>
    <button class="ctrl" id="pauseBtn" title="Pause / play">‖</button>
    <button class="ctrl" id="nextBtn" title="Next scene">→</button>
    <button class="ctrl" id="restartBtn" title="Restart from scene 1">⟲</button>
  </div>
</div>

<script>

// ─────────────────────────────────────────────────────────────────────────

// Gemini    — gemini-2.5-flash           →  typed-error fallback path
//
// All three runs validated against fluid-schema-0.7.2 with score 10.
// ─────────────────────────────────────────────────────────────────────────

const SCENES = [

      },
      {
        "cls": "dim",

      },
      {
        "cls": "dim",
        "html": "<span class=\"key\">metrics</span>: [total_revenue, order_count, AOV]"
      },
      {
        "cls": "dim",
        "html": "<span class=\"key\">modeling</span>: { technique: dimensional }"
      }
    ],
    "callout": "Eight lines. The AI handles the rest."
  },
  {
    "kind": "term",
    "duration": 9500,
    "title": "anthropic · claude-haiku-4-5",
    "headline": "Build it · Anthropic.",
    "sub": "Streaming. Prompt-cache aware. Exact token attribution.",
    "lines": [
      {
        "cls": "prompt cmd",
        "text": "fluid forge data-model from-intent intent.yaml \\",

      },
      {
        "cls": "dim",

      },
      {

  {

  },
  {
    "kind": "closing",
    "duration": 7000,
    "body": "\n      <h2>$0.03 average. Free on Ollama.<br/>Zero glue code.</h2>\n      <div class=\"scene-sub\" style=\"font-size:18px;color:var(--text-dim);max-width:680px;text-align:center;\">\n        Pick any model. Switch any time. The contract stays portable —\n        DuckDB locally, BigQuery, Snowflake, Athena when you ship.\n      </div>\n      <div class=\"stats\">\n        <div class=\"stat\"><div class=\"num\">$0.03</div><div class=\"lbl\">avg per build</div></div>\n        <div class=\"stat\"><div class=\"num\">3</div><div class=\"lbl\">providers · 1 contract</div></div>\n        <div class=\"stat\"><div class=\"num\">0</div><div class=\"lbl\">lines of glue code</div></div>\n        <div class=\"stat\"><div class=\"num\">0</div><div class=\"lbl\">vendor lock-in</div></div>\n      </div>\n      <div class=\"meta\" style=\"margin-top:34px;color:var(--text-faint);font-family:var(--mono);font-size:12px;\">\n        ← → step · space pause · r restart\n      </div>\n    "

];;

// ─────────────────────────────────────────────────────────────────────────
// Renderer
// ─────────────────────────────────────────────────────────────────────────

const stage = document.getElementById("stage");
const sceneIdEl = document.getElementById("sceneId");
const progressFill = document.getElementById("progressFill");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const pauseBtn = document.getElementById("pauseBtn");

let currentIdx = 0;
let sceneStarted = 0;
let progressTimer = null;
let advanceTimer = null;
let typingTimers = [];
let paused = false;

function buildHero(scene) {
  const div = document.createElement("div");
  div.className = "scene hero";
  div.innerHTML = scene.body;
  return div;
}

function buildClosing(scene) {
  const div = document.createElement("div");
  div.className = "scene closing";
  div.innerHTML = scene.body;
  return div;
}

function buildTerm(scene) {
  const div = document.createElement("div");
  div.className = "scene";
  div.innerHTML = `
    <div class="scene-title">${escape(scene.title || "")}</div>
    <div class="scene-headline">${escape(scene.headline || "")}</div>
    <div class="scene-sub">${escape(scene.sub || "")}</div>
    <div class="term-wrap">
      <div class="term">
        <div class="term-bar">
          <div class="lights"><span class="light r"></span><span class="light y"></span><span class="light g"></span></div>
          <div class="title">${escape(scene.title || "")}</div>
          <div style="width:42px"></div>
        </div>
        <div class="term-body" data-role="term-body"></div>
      </div>
    </div>
    ${scene.callout ? `<div class="callout">${scene.callout}</div>` : ""}
  `;
  return div;
}

function buildSplit(scene) {
  const div = document.createElement("div");
  div.className = "scene";
  div.innerHTML = `
    <div class="scene-headline">${escape(scene.headline || "")}</div>
    <div class="scene-sub">${escape(scene.sub || "")}</div>
    <div class="split">
      <div class="panel"><h3>${escape(scene.leftTitle || "")}</h3><div class="body" data-role="left-body"></div></div>
      <div class="panel"><h3>${escape(scene.rightTitle || "")}</h3><div class="body" data-role="right-body"></div></div>
    </div>
  `;
  return div;
}

function buildCompare(scene) {
  const div = document.createElement("div");
  div.className = "scene";
  const rows = scene.rows.map(r => `
    <tr>
      <td class="col-key">${escape(r[0])}</td>
      <td class="col-before">${escape(r[1])}</td>
      <td class="col-after">${escape(r[2])}</td>
      <td class="col-impact">${escape(r[3])}</td>
    </tr>
  `).join("");
  div.innerHTML = `
    <div class="scene-headline">${escape(scene.headline || "")}</div>
    <div class="scene-sub">${escape(scene.sub || "")}</div>
    <div class="compare">
      <table>
        <thead><tr><th>Capability</th><th>Before Option A</th><th>After</th><th>Why it matters</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
  return div;
}

function buildScene(scene) {
  switch (scene.kind) {
    case "hero": return buildHero(scene);
    case "term": return buildTerm(scene);
    case "split": return buildSplit(scene);
    case "compare": return buildCompare(scene);
    case "closing": return buildClosing(scene);
  }
}

function escape(s) {
  return String(s).replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
}

function appendLine(host, line) {
  const el = document.createElement("div");
  el.className = "term-line " + (line.cls || "");
  if (line.html) el.innerHTML = line.html;
  else el.textContent = "";
  host.appendChild(el);
  return el;
}

function typeLine(el, line) {
  return new Promise(resolve => {
    if (line.html) {
      // HTML lines render instantly (already-styled snippets).
      resolve();
      return;
    }
    const text = line.text || "";
    if (line.typingSpeed) {
      let i = 0;
      const cursor = document.createElement("span");
      cursor.className = "term-cursor";
      el.appendChild(cursor);
      const speed = Math.max(8, 1000 / line.typingSpeed); // chars/sec → ms/char
      const tick = () => {
        if (paused) {
          const t = setTimeout(tick, 100);
          typingTimers.push(t);
          return;
        }
        if (i >= text.length) {
          cursor.remove();
          resolve();
          return;
        }
        const ch = text[i++];
        cursor.insertAdjacentText("beforebegin", ch);
        const t = setTimeout(tick, speed + (Math.random() * speed * 0.3));
        typingTimers.push(t);
      };
      tick();
    } else {
      el.textContent = text;
      resolve();
    }
  });
}

async function playLines(host, lines) {
  for (const line of lines) {
    if (line.delay) await sleep(line.delay);
    const el = appendLine(host, line);
    await typeLine(el, line);
    host.scrollTop = host.scrollHeight;
  }
}

function sleep(ms) {
  return new Promise(resolve => {
    const t = setTimeout(resolve, ms);
    typingTimers.push(t);
  });
}

function clearTypingTimers() {
  typingTimers.forEach(t => clearTimeout(t));
  typingTimers = [];
}

function showScene(idx) {
  // Cancel anything running.
  clearTypingTimers();
  if (advanceTimer) clearTimeout(advanceTimer);
  if (progressTimer) clearInterval(progressTimer);
  paused = false;

  const scenes = stage.querySelectorAll(".scene");
  scenes.forEach(s => s.classList.remove("active"));

  // Replace stage content with the next scene element.
  stage.innerHTML = "";
  const scene = SCENES[idx];
  const el = buildScene(scene);
  stage.appendChild(el);
  // Force layout, then activate the fade.
  el.offsetWidth;
  el.classList.add("active");

  sceneIdEl.textContent = `scene ${idx + 1} / ${SCENES.length}`;
  sceneStarted = performance.now();

  // Begin progress bar animation.
  const dur = scene.duration || 8000;
  progressFill.style.width = "0%";
  progressTimer = setInterval(() => {
    if (paused) return;
    const elapsed = performance.now() - sceneStarted;
    const pct = Math.min(100, (elapsed / dur) * 100);
    progressFill.style.width = pct + "%";
  }, 100);

  // Auto-advance.
  advanceTimer = setTimeout(() => next(), dur);

  // Render lines (terminal / split scenes).
  if (scene.kind === "term") {
    const body = el.querySelector('[data-role="term-body"]');
    playLines(body, scene.lines);
  } else if (scene.kind === "split") {
    const left = el.querySelector('[data-role="left-body"]');
    const right = el.querySelector('[data-role="right-body"]');
    playLines(left, scene.leftLines);
    setTimeout(() => playLines(right, scene.rightLines), 600);
  }
}

function next() {
  const i = (currentIdx + 1) % SCENES.length;
  currentIdx = i;
  showScene(i);
}
function prev() {
  const i = (currentIdx - 1 + SCENES.length) % SCENES.length;
  currentIdx = i;
  showScene(i);
}
function restart() {
  currentIdx = 0;
  showScene(0);
}
function togglePause() {
  paused = !paused;
  pauseBtn.textContent = paused ? "▶" : "‖";
  if (paused) {
    if (advanceTimer) clearTimeout(advanceTimer);
  } else {
    // Resume from where we paused.
    const scene = SCENES[currentIdx];
    const dur = scene.duration || 8000;
    const elapsed = performance.now() - sceneStarted;
    const remaining = Math.max(0, dur - elapsed);
    advanceTimer = setTimeout(next, remaining);
  }
}

prevBtn.addEventListener("click", prev);
nextBtn.addEventListener("click", next);
restartBtn.addEventListener("click", restart);
pauseBtn.addEventListener("click", togglePause);
window.addEventListener("keydown", e => {
  if (e.key === "ArrowRight") next();
  else if (e.key === "ArrowLeft") prev();
  else if (e.key === " ") { e.preventDefault(); togglePause(); }
  else if (e.key === "r" || e.key === "R") restart();
});

// Kick off.
showScene(0);
</script>

</body>
</html>
