fluidVersion: "0.7.2"
kind: "DataProduct"
id: "example.hello_world_v1"
name: "Hello World"
description: "Minimal local FLUID data product example."
domain: "example"
metadata:
  layer: "Bronze"
  owner:
    team: "learning-team"
    email: "team@example.com"
builds:
  - id: "hello_transformation"
    pattern: "embedded-logic"
    engine: "sql"
    properties:
      sql: |
        SELECT
          'Hello, FLUID!' AS message,
          CURRENT_TIMESTAMP AS created_at
exposes:
  - exposeId: "hello_output"
    kind: "table"
    binding:
      platform: "local"
      format: "csv"
      location:
        path: "runtime/out/hello-world-v1.csv"
    contract:
      schema:
        - name: "message"
          type: "string"
          required: true
          description: "Example message."
        - name: "created_at"
          type: "timestamp"
          required: true
          description: "Creation timestamp."
