fluidVersion: "0.7.2"
kind: "DataProduct"
id: "example.validated_sales_v1"
name: "Validated Sales Data"
description: "Local sales cleanup contract with explicit output schema."
domain: "sales"
metadata:
  layer: "Bronze"
  owner:
    team: "data-quality-team"
    email: "data-quality@example.com"
builds:
  - id: "clean_sales"
    pattern: "embedded-logic"
    engine: "sql"
    properties:
      sql: |
        SELECT
          order_id,
          customer_id,
          order_date,
          amount,
          region,
          status,
          CURRENT_TIMESTAMP AS validated_at
        FROM sales_raw
        WHERE customer_id IS NOT NULL
          AND order_date IS NOT NULL
          AND amount > 0
          AND region IN ('North', 'South', 'East', 'West')
          AND status IN ('pending', 'completed', 'cancelled')
exposes:
  - exposeId: "clean_sales_data"
    kind: "table"
    binding:
      platform: "local"
      format: "csv"
      location:
        path: "runtime/out/validated-sales-v1.csv"
    contract:
      schema:
        - name: "order_id"
          type: "integer"
          required: true
        - name: "customer_id"
          type: "string"
          required: true
        - name: "order_date"
          type: "date"
          required: true
        - name: "amount"
          type: "number"
          required: true
        - name: "region"
          type: "string"
          required: true
        - name: "status"
          type: "string"
          required: true
        - name: "validated_at"
          type: "timestamp"
          required: true
      dq:
        rules:
          - id: "order_id_not_null"
            type: "completeness"
            selector: "order_id"
            threshold: 1.0
            operator: ">="
            severity: "error"
          - id: "customer_id_not_null"
            type: "completeness"
            selector: "customer_id"
            threshold: 1.0
            operator: ">="
            severity: "error"
